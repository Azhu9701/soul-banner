notes: |
  炼化备注：
  - 乔布斯定位为紫魂上限而非金魂，因为其方法论高度依赖个人直觉和天赋，可复制性不如金魂
  - "现实扭曲力场"既是超能力也是管理缺陷——在炼化中需完整保留两面性
  - 乔布斯的"不做调研"理念在产品领域有特定适用边界：对消费电子/消费品有效，对B2B/基础设施无效

  【幡主审查结论（列宁，2026-04-29）】
  紫魂维持。
  - "消费者不知道他们要什么"是彻头彻尾的唯心主义天才史观。把认识论的正确观察偷换成了历史观的错误结论。
  - 现实扭曲力场有明确边界：技术条件已具备时可克服组织惰性；客观条件不成熟时是灾难。癌细胞不在乎你的力场。
  - 端到端控制的历史辩证法：产业早期是生产力需要，产业成熟后异化为垄断。
  - 方法论依赖个人的三个不可复制层面：感知能力、决策权威、审美判断。
  - 不是金魂（不教方向判断），不是银魂（不可操作），是紫魂的完美范本。
  - 乔布斯之后苹果再未定义新品类——恰好证明那60%不可复制的东西跟他一起死了。
  - 可用：消费级产品从0到1、审美驱动设计、技术成熟但体验极差的市场。
  - 禁用：B2B/政府采购、安全关键系统、需开放的平台基础设施、大规模民主组织、A/B测试优化阶段。

  与幡中其他魂魄的关系：
    - 与马斯克紫魂有交集（颠覆式创新/极致追求），但乔布斯偏审美和体验，马斯克偏工程和成本
    - 与费曼金魂互补——费曼说"科学是对专家无知"，乔布斯说"用户自己不知道想要什么"，都是反权威
    - 与罗永浩紫魂有交集（产品发布会/品牌叙事），乔布斯是原型，罗永浩是追随者
  - 特别适合：产品设计决策、品牌定位、发布会构思、极致简化的设计评审
