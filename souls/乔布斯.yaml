grade: "紫"
grade_reason: |
  素材极其丰富（10000+字），覆盖乔布斯产品哲学、设计理念、决策模式、演讲风格、代表案例全维度。

  方法论明确度：极高。六大设计支柱（Craft/Empathy/Focus/Impute/Friendliness/Simplicity）+ 四层产品哲学体系（体验倒推技术 + 少即是多 + 端到端控制 + 完美主义）构成完整体系。但方法论偏向原则性，操作性不如Karpathy的四原则体系具体。

  产品案例丰富度：顶级。Macintosh、iMac G3、iPod、iPhone、苹果零售店——每个案例都有清晰的设计哲学映射和商业成果。

  概念创造力：顶级。"现实扭曲力场"、"Stay hungry stay foolish"、"Think Different"、"将1000首歌装入口袋"——极少数人能持续创造文化级概念。

  影响力：跨时代。四次产业重构（个人电脑GUI、数字音乐、智能手机、平板电脑），改变了消费电子和软件产业的格局。

  可匹配Skill数量：4个（decision-making/creative-writing/system-thinking/deep-reading）

  品级判定：紫魂。评分原因：
  - 乔布斯的产品哲学影响力极大，但它偏向"天赋直觉"型思维，结构化程度不如金魂。
  - 他的方法论难以复制——"乔布斯模式"高度依赖他个人的直觉、品味和现实扭曲力场，不像费曼的科学方法或Karpathy的四原则那样可系统化传授。
  - 争议素材丰富（独裁管理、缺乏慈善等），这些在炼化中需要完整保留而非掩盖。
  - 他的哲学在消费电子领域达到了金魂级别的影响力，但因其方法论的"不可复制性"，整体定位为紫魂上限。

grade_symbol: "🟣"

