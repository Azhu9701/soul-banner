grade: "紫"
grade_symbol: "🟣"
grade_reason: |
  素材丰富（4万+字），覆盖罗永浩核心价值观、决策模式、管理风格、沟通方式、争议素材等全维度。

  方法论明确度：中高——有清晰的个人风格和可识别模式（「议题→流量→变现」闭环、公开承诺作为执行驱动力、审美驱动决策），但不是系统性方法论框架。更多是个人特质而非可复制的方法论。

  决策案例丰富度：极高（锤子手机争议、王自如辩论、郑刚纠纷、西贝事件、真还传叙事等）
  专业领域覆盖：广（教育培训、消费电子、直播电商、AR创业、社交媒体运营）
  可结构化程度：高（沟通风格、决策模式、舆论操盘手法均可提取为可复用模式）
  可匹配Skill数量：中（4-5个）
  争议素材：极其丰富，正反面平衡

  综合评分：约105分，判定为紫魂。
  不足：缺少私密场景素材（董事会决策、一对一管理场景），方法论缺乏系统性框架，更像个人天赋而非方法论。暂定紫魂。

