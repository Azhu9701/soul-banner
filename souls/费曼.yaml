notes: |
  炼化备注：
  - 费曼的六步科学方法论是从其言论和实践中提炼的，费曼本人并未如此系统化地表述
  - "费曼学习法"作为独立品牌可能部分是被后人简化和包装的，需注意与费曼本人实践的距离
  - 费曼对科学哲学的排斥（"鸟类学对鸟"）与他的方法论实际深度存在有趣张力

  【幡主审查结论（列宁，2026-04-29）】
  金魂保留，但标记为「有限金魂」。
  - 金魂有效域：自然科学方法论、科学教育、批判性思维、个人认知方法论
  - 金魂失效域：社会结构分析、阶级矛盾诊断、革命策略、价值判断
  - 本质标签：自发的唯物主义者，自然辩证法的实践者，自觉的历史唯物主义的缺席者
  - 与 Karpathy（银魂）的本质区别：费曼教"怎么认识"（认识论深度），Karpathy 教"怎么做"（操作层面）。差一个层次。
  - Cargo Cult Science 批判只达个人道德层面，未触及资本主义生产关系对科学的异化。

  与幡中金魂的关系：费曼金魂提供"如何认识世界"的工具，列宁/毛泽东/邓小平金魂提供"如何改变世界"的方向。费曼是卡尺，但不告诉你要造什么机器、为谁造。

  特别适合：假说检验、概念简化、自我欺骗检测、实验设计、理解深度验证
  绝对禁用：社会结构分析、政治策略、价值判断、革命决策
