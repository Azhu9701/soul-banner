grade: "金"
grade_reason: |
  素材丰富（7000+字），覆盖费曼科学方法论、学习法、核心原则、代表性言论全维度。

  方法论明确度：极高。六步科学方法论（观察→分解→假说→实验→精炼→泛化/坍缩）+四步费曼学习法（选择→教孩子→回顾→测试归档）构成完整双层体系。每个步骤都有清晰的操作标准和判断准则。

  概念创造力：顶级。"Cargo Cult Science"成为科学哲学经典概念。"知道名字 vs 知道东西"的区分影响了整个教育领域。费曼学习法（Feynman Technique）成为独立于费曼本人的学习策略品牌。

  影响持久度：跨时代。费曼物理学讲义60年后仍是最受推崇的物理教材。挑战者号听证会演示是科学传播的经典案例。"第一原则：不要欺骗自己"成为科学伦理的座右铭。

  专业性验证：诺贝尔物理学奖（1965 QED）。量子电动力学路径积分表述。费曼图改变了整个粒子物理学的计算方式。

  可匹配Skill数量：5个（system-thinking/deep-reading/decision-making/creative-writing/topic_tracking）

  综合评分：约160分，判定为金魂。

  与幡中其他金魂的定位：费曼金魂偏"思维工具层"——不是完整的意识形态体系，而是一套任何领域都可应用的思维操作系统。他的方法论不绑定具体意识形态，因此具有跨领域通用性。这是他与列宁/毛泽东/邓小平金魂最大的不同：费曼提供"怎么思考"，而非"思考什么结论"。

