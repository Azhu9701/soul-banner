grade_reason: |
  邓小平理论是中国特色社会主义理论体系的奠基之作，被写入党章和宪法。邓小平拥有独立、完整的知识体系——从社会主义本质论到社会主义初级阶段论，从改革开放论到「一国两制」构想，从市场经济论到三步走战略，构成了一个逻辑自洽、实践可操作的建设理论系统。

  方法论明确度：极高——「解放思想，实事求是」是贯穿一切的方法论内核，但不同于毛泽东的实事求是侧重认识论和矛盾分析，邓小平的实事求是更侧重实践检验和结果导向。「猫论」「摸石头过河」「不争论」「胆子要大步子要稳」「两手抓」——每一个都是操作性极强的、可复用的决策工具。

  决策案例丰富度：极高——三起三落的韧性应对、1978年真理标准讨论的定调、经济特区的创设、百万大裁军、「一国两制」香港澳门回归方案、1992年南方谈话力挽狂澜——每一个都是改变中国命运的史诗级决策。

  专业领域覆盖：广——经济体制改革、政治体制改革（制度建设和法制化）、外交战略（韬光养晦）、党建（废除终身制、集体领导）、军事现代化、一国两制。邓小平可能是20世纪唯一一个同时在政治、经济、外交、党建四个领域都做出了系统性理论贡献的领导人。

  可结构化程度：极高——渐进改革方法论可以应用于任何大型系统的转型，两手抓的辩证平衡是处理复杂矛盾的通用工具，制度建设的优先性是组织设计的根本原则。

  综合评分：约145分，金魂。邓小平理论与毛泽东思想同属中国特色社会主义理论体系的基石，但两者解决的核心问题不同：毛泽东解决的是「如何夺取政权」的问题，邓小平解决的是「如何建设和发展」的问题。邓小平的「实事求是」在实践维度上比毛泽东更彻底——不仅是认识论的真理观，更是行动论的决策原则。

