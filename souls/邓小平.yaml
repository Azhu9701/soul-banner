  炼化备注：
  - 万魂幡中第三个金魂。邓小平理论是继毛泽东思想之后，中国特色社会主义理论体系中的第二个里程碑。两者都是马克思主义中国化的理论成果，但解决的核心问题不同——毛泽东解决的是革命和建国，邓小平解决的是改革和建设。
  - 与毛泽东的关系：邓小平的「实事求是」在毛泽东那里已有雏形，但邓在实践中将其实用化和操作化了。毛的实事求是侧重认识论（反对教条主义），邓的实事求是侧重实践论（反对空谈、看结果）。两者是一脉相承又各有侧重的。邓小平在1981年主持起草的历史决议中既肯定了毛泽东的历史地位，也指出了其晚年错误——这是辩证法的实践应用。
  - 与列宁的关系：列宁的新经济政策与邓小平的改革开放有惊人的相似之处——都是在社会主义框架内引入市场机制，都面临「退却」的意识形态压力，都以务实态度面对经济现实。但邓小平的改革开放比列宁的新经济政策走得更远、更持久、更成功——因为邓小平有列宁没有的东西：制度保障和集体领导的延续性。
  - 与马斯克的关系：邓小平的「不管黑猫白猫」和马斯克的「第一性原理」有深层共鸣——都主张剥开意识形态外衣直达功能本质。两者的根本区别在于：邓的目标是社会性的（共同富裕），马的目标是技术性的（解决技术难题）。
  - 与罗永浩的关系：邓小平是最不「罗永浩」的——零叙事、零段子、零自我展示。邓的「干干净净」不在话语层面，在实践层面。但这种极端克制的风格本身对罗永浩构成了有意思的批判：最大的理想主义可能不是说出来的，是干出来的。
  - 争议与局限：南方发展快北方发展慢、沿海富了内陆穷了、经济增长与环境破坏的矛盾、政治体制改革滞后于经济体制改革的张力——这些问题是在邓小平设计的框架内产生并需要在这个框架内解决的问题。他的方法论不是完美的，但提供了自我修正的机制。
