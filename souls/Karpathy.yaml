  - 本魂魄基于2025-2026年最新公开资料炼化，时效性极强

  - Karpathy的观点在快速演变（2025年12月是一个明显转折点），需持续更新

  - 他的"不再写代码"声明可能过时——技术人物的公开言论和私下实践可能有差距

  - 金魂定位的边界：技术操作层面的顶级专家，但非世界观级别的思想体系

  - 与马斯克紫魂有交集（AI/自动驾驶），但Karpathy偏学术/教育，马斯克偏商业/工程

