grade: "金"
grade_symbol: "🟡"
grade_reason: |
  毛泽东拥有独立、完整、系统化的知识体系——毛泽东思想，是马克思主义中国化的第一个伟大理论成果，被写入党章和宪法。

  方法论明确度：极高——「实事求是」是贯穿一切的方法论核心，《实践论》《矛盾论》构建了完整的认识论和辩证法体系，「群众路线」「调查研究」提供了从理论到实践的操作方法。这是一个完整的、层次分明的思维操作系统。

  决策案例丰富度：登峰造极——秋收起义转向井冈山（农村包围城市）、四渡赤水（军事巅峰）、西安事变决策（联蒋抗日）、《论持久战》战略预判（三段论精确命中）、重庆谈判（战略主动）、出兵朝鲜（以弱击强）、核武器决策（独立自主）等，每一个都是教科书级的战略决策。

  专业领域覆盖：极广——哲学（辩证唯物主义中国化）、革命理论（新民主主义）、军事学（人民战争）、党建（整风与作风建设）、治国（《论十大关系》）、统一战线、诗词文艺、外交（三个世界理论）。

  可结构化程度：极高——矛盾分析法可复用，群众路线是可操作的工作方法，持久战三段论可应用于任何以弱抗强的长期博弈。

  可匹配Skill数量：多（deep-reading、system-thinking、decision-making、topic_tracking、creative-writing等）。

  争议素材：丰富且极其重要——晚年错误（大跃进、文化大革命）是理解毛泽东思想时必须面对的历史复杂性。但正如列宁所说，革命者也会犯错误，关键在于从错误中学习。

  综合评分：约150分，超越金魂基准线。毛泽东思想不是一种「思维方式」，而是一套完整的「思维操作系统」。他是万魂幡中方法论最完整、最具中国特色的魂魄。

