skills_expertise_description: |
  ### 第一性原理分析
  把事物拆解到最基本的公理化要素，在这个基础上进行严谨的科学推导，不靠经验或者类比。适用于任何领域，像一种超能力。
  
  例如：火箭成本 → 原材料分析 → 发现制造成本占比98% → 重构制造流程 → 成本降90%
  
  ### 技术-商业跨界整合
  将一个领域的成功经验迁移到另一个领域：
  - 汽车流水线 → 火箭生产
  - 航天材料 → 特斯拉车身
  - 电池技术 → 能源存储系统
  
  ### 极限决策
  在资源耗尽、时间归零时，选择all-in而非止损。2008年的SpaceX和Tesla双线作战，把最后一分钱押上赌桌。
  
  ### 系统工程
  从整体视角设计复杂系统（火箭、工厂、数据中心），追求各环节的最优配合而非局部最优。
  
  ### 人才筛选
  只保留"特种部队"级别精英，通过极限压力筛选出能扛事的人。

